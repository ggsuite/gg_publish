name: gg_publish
description: Various tools and checks for publishing dart packages, e.g. versioning, checks etc.
version: 3.3.1
publish_to: none
repository: https://github.com/inlavigo/gg_publish.git

environment:
  sdk: ">=3.8.0 <4.0.0"

dependencies:
  args: ^2.4.2
  gg_args:
    git:
      url: git@github.com:ggsuite/gg_args.git
      ref: ticket-test
  gg_console_colors: ^2.1.5
  gg_is_flutter:
    git:
      url: git@github.com:ggsuite/gg_is_flutter.git
      ref: ticket-test
  gg_log:
    git:
      url: git@github.com:ggsuite/gg_log.git
      ref: ticket-test
  gg_process: ^1.0.7
  gg_status_printer:
    git:
      url: git@github.com:ggsuite/gg_status_printer.git
      ref: ticket-test
  gg_version:
    git:
      url: git@github.com:ggsuite/gg_version.git
      ref: ticket-test
  http: ^1.2.1
  matcher: ^0.12.16+1
  mocktail: ^1.0.3
  path: ^1.8.0
  pub_semver: ^2.1.4
  gg_git:
    git:
      url: git@github.com:ggsuite/gg_git.git
      ref: ticket-test
dev_dependencies:
  fake_async: ^1.3.1
  gg_capture_print: ^1.0.9
  lints: ^6.0.0
  test: ^1.24.0

executables:
  gg_publish: